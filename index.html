<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR 3D Model Viewer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <div id="container">
        <canvas id="scene"></canvas>
        <div id="ui-overlay">
            <h1>WebXR 3D Model Viewer</h1>
            <div id="model-controls">
                <label for="model-select">Select Model:</label>
                <select id="model-select">
                    <option value="">-- Choose a model --</option>
                    <option value="models/sample.glb">Sample Model</option>
                </select>
                <input type="file" id="model-upload" accept=".glb,.gltf" />
                <label for="model-upload" class="upload-btn">Upload Model</label>
            </div>
            <button id="vr-button" disabled>VR Not Available</button>
            <button id="ar-button" disabled>Passthrough Not Available</button>
            <p id="status">Loading...</p>
        </div>
    </div>

    <!-- Three.js from CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="js/app.js"></script>
</body>
</html>
