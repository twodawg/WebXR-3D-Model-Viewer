<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR 3D Model Viewer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <div id="container">
        <canvas id="scene"></canvas>
        <iframe id="splat-viewer-frame" title="SuperSplat Viewer" allow="fullscreen; xr-spatial-tracking"></iframe>
        <div id="ui-overlay">
            <h1>WebXR 3D Model Viewer</h1>
            <div id="model-controls">
                <label for="model-select">Select Model:</label>
                <select id="model-select">
                    <option value="">-- Choose a model --</option>
                    <option value="models/Woman%20in%20Black%20Dress.ply">Woman in Black Dress</option>
                </select>
                <input type="file" id="model-upload" accept=".glb,.gltf,.splat,.ksplat,.ply" />
                <label for="model-upload" class="upload-btn">Upload Model</label>
            </div>
            <button id="vr-button" disabled>VR Not Available</button>
            <button id="ar-button" disabled>Passthrough Not Available</button>
            <p id="status">Loading...</p>
        </div>
        <div id="vr-tutorial" class="tutorial-hidden" aria-live="polite">
            <h2>VR Controls</h2>
            <p>Press either thumbstick to show or hide this panel.</p>
            <ul>
                <li>Left stick: move around</li>
                <li>Right stick: rotate model (X), raise/lower model (Y)</li>
                <li>Hold both grips and move hands: pinch zoom</li>
                <li>A/X: toggle passthrough</li>
                <li>B/Y: exit session</li>
            </ul>
        </div>
    </div>

    <!-- Three.js from CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="js/app.js"></script>
</body>
</html>
